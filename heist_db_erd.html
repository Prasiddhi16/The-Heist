
<style>
#erd { padding: 1rem 0; }
#erd svg { max-width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a40' : '#eeedfe',
    primaryBorderColor: dark ? '#534AB7' : '#534AB7',
    primaryTextColor: dark ? '#c2c0b6' : '#26215C',
    secondaryColor: dark ? '#1a2a20' : '#e1f5ee',
    secondaryBorderColor: dark ? '#0F6E56' : '#0F6E56',
    tertiaryColor: dark ? '#2a1a10' : '#faeeda',
    tertiaryBorderColor: dark ? '#854F0B' : '#854F0B',
  },
});

const diagram = `erDiagram
  USERS {
    INT user_id PK
    VARCHAR username
    VARCHAR password
    VARCHAR rank
    INT cases_solved
    INT score
  }
  CASES {
    VARCHAR case_id PK
    VARCHAR case_name
    VARCHAR location
    TEXT description
    DECIMAL loss_amount
    INT difficulty
    VARCHAR status
    INT culprit_id FK
  }
  EVIDENCE {
    INT evidence_id PK
    VARCHAR case_id FK
    VARCHAR evidence_name
    VARCHAR evidence_type
    INT confidence_score
    TEXT description
  }
  SUSPECTS {
    INT suspect_id PK
    VARCHAR case_id FK
    VARCHAR suspect_name
    VARCHAR occupation
    INT motive_score
    INT suspicion_score
    BOOLEAN is_guilty
  }
  RESULTS {
    INT result_id PK
    INT user_id FK
    VARCHAR case_id FK
    INT selected_suspect
    VARCHAR result_status
    DECIMAL accuracy
    INT score_awarded
    DATE solved_date
  }
  LEADERBOARD {
    INT leaderboard_id PK
    INT user_id FK
    INT rank_position
    INT total_score
    DECIMAL accuracy_rate
  }

  USERS ||--o{ RESULTS : "submits"
  CASES ||--o{ RESULTS : "receives"
  CASES ||--o{ EVIDENCE : "has"
  CASES ||--o{ SUSPECTS : "involves"
  USERS ||--|| LEADERBOARD : "ranked in"
  SUSPECTS ||--o{ CASES : "culprit of"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
