{% extends 'index.html' %}

{% block title %}Active Cases{% endblock %}

{% block content %}

<div class="page-hdr">
  <div>
    <div class="page-title">Active Cases</div>
    <div class="page-sub">Select a case to begin your investigation.</div>
  </div>
</div>

<!-- Filter Pills -->
<div class="case-filters">
  <button class="filter-pill active" onclick="filterCases('all', this)">All</button>
  <button class="filter-pill" onclick="filterCases('open', this)">Open</button>
  <button class="filter-pill" onclick="filterCases('active', this)">Active</button>
  <button class="filter-pill" onclick="filterCases('closed', this)">Closed</button>
</div>

<!-- Cases Grid -->
<div class="case-grid" id="caseGrid">
  <p>Loading cases...</p>
</div>
<!-- /case-grid -->

<script>
  function filterCases(status, btn) {
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');

    document.querySelectorAll('.case-card').forEach(card => {
      const match = status === 'all' || card.dataset.status === status;
      card.style.display = match ? 'flex' : 'none';
    });
  }

  function openCase(caseId) {
    sessionStorage.setItem('selectedCase', caseId);
    window.location.href = "{% url 'evidence' %}";
  }

  function formatDate(isoString) {
    if (!isoString) return '';
    // created_at comes back as an ISO timestamp, e.g. "2026-07-16T13:25:07.30744+00:00"
    // we only want the date portion to match the design.
    return isoString.split('T')[0];
  }

  function renderCases(cases) {
    const grid = document.getElementById('caseGrid');

    if (!cases || cases.length === 0) {
      grid.innerHTML = '<p>No active cases found.</p>';
      return;
    }

    grid.innerHTML = cases.map(function (c) {
      const status = (c.status || '').toLowerCase();
      return `
        <div class="case-card" data-status="${status}" onclick="openCase('${c.case_number}')">
          <div class="case-card-top">
            <div>
              <div class="case-num">${c.case_number || ''}</div>
              <div class="case-title">${c.title || ''}</div>
            </div>
            <span class="badge">${c.status || ''}</span>
          </div>
          <div class="case-loc"><i class="fa-solid fa-location-dot"></i> ${c.location || ''}</div>
          <p style="font-size:.78rem;color:var(--muted);line-height:1.55;">
            ${c.description || ''}
          </p>
          <div class="case-meta">
            <div class="case-loss">Loss: <strong>${c.loss_value || 'N/A'}</strong> · ${formatDate(c.created_at)}</div>
          </div>
          <button class="btn btn-primary btn-full" onclick="event.stopPropagation(); openCase('${c.case_number}')">
            <i class="fa-solid fa-magnifying-glass"></i> Investigate
          </button>
        </div>
      `;
    }).join('');
  }

  document.addEventListener('DOMContentLoaded', async function () {
    const grid = document.getElementById('caseGrid');

    if (!window.supabaseClient) {
      grid.innerHTML = '<p>Unable to connect to the database. Check your Supabase configuration.</p>';
      console.error('window.supabaseClient is not defined — check supabase-client.js and that SUPABASE_URL/SUPABASE_ANON_KEY are populated.');
      return;
    }

    const { data, error } = await window.supabaseClient
      .from('cases')
      .select('case_id, case_number, title, status, location, loss_value, risk_level, description, created_at')
      .order('created_at', { ascending: false });

    if (error) {
      grid.innerHTML = '<p>Failed to load cases. Please try again later.</p>';
      console.error('Supabase fetch error:', error);
      return;
    }

    renderCases(data);
  });
</script>

{% endblock %}
