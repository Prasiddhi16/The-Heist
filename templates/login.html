{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heist Solver — Detective Intelligence System</title>
    <link rel="stylesheet" href="{% static 'styles/root.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Utility fallback to make sure hidden states hide correctly */
        .hidden { display: none !important; }
        .error-msg { color: #ff6b6b; font-size: 0.85rem; margin-bottom: 1rem; text-align: center; }
    </style>
</head>

<body>

<div id="screen-login">
    <div class="login-art">
        <div class="login-art-svg"></div>

        <div class="login-art-text">
            <h2>Heist Solver</h2>
            <p>Detective Intelligence System</p>
        </div>
    </div>

    <div class="login-form-panel">

        <div class="lf-logo">
            <div class="lf-logo-icon">H</div>

            <div>
                <div class="lf-logo-text">Heist Solver</div>
                <div class="lf-logo-sub">Detective Intelligence System</div>
            </div>
        </div>

        <div class="tab-switch">
            <button class="tab-btn active" id="ltab-in" onclick="switchLoginTab('in')">
                Sign In
            </button>

            <button class="tab-btn" id="ltab-up" onclick="switchLoginTab('up')">
                Register
            </button>
        </div>

        <!-- Error reporting zone -->
        <div id="auth-error" class="error-msg hidden"></div>

        <div id="reg-fields" class="hidden">
            <div class="rf">
                <label class="flabel">Full Name</label>
                <input class="finput"
                       placeholder="e.g. Inspector Kane"
                       id="reg-name">
            </div>
        </div>

        <div class="rf">
            <label class="flabel">Username</label>
            <input class="finput"
                   placeholder="Enter your username"
                   id="inp-user"
                   value="inspector_kane">
        </div>

        <div class="rf">
            <label class="flabel">Password</label>
            <input class="finput"
                   type="password"
                   placeholder="Enter your password"
                   id="inp-pass"
                   value="password">
        </div>

        <button class="submit-btn"
                id="login-btn"
                onclick="handleSubmit(event)">
            Access Intelligence System
        </button>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  window.SUPABASE_URL = "{{ supabase_url }}";
  window.SUPABASE_ANON_KEY = "{{ supabase_anon_key }}";
</script>

<script src="{% static 'js/supabase-client.js' %}"></script>
<script>

let loginMode = "in";
function showError(msg) {
    const errBox = document.getElementById("auth-error");
    if (msg) {
        errBox.textContent = msg;
        errBox.classList.remove("hidden");
    } else {
        errBox.classList.add("hidden");
    }
}

function switchLoginTab(mode) {
    loginMode = mode;
    showError(""); // Clear old status alerts

    document.getElementById("ltab-in").classList.toggle("active", mode === "in");
    document.getElementById("ltab-up").classList.toggle("active", mode === "up");
    document.getElementById("reg-fields").classList.toggle("hidden", mode === "in");

    document.getElementById("login-btn").textContent =
        mode === "in"
            ? "Access Intelligence System"
            : "Create Account";
}

async function handleSubmit(event) {
    event.preventDefault(); 
    showError("");
    
    // Check client instance state before calling APIs
    if (!window.supabaseClient) {
        showError("Supabase initialization failed. Verify client connection settings. ");
        return;
    }

    const username = document.getElementById("inp-user").value.trim().toLowerCase();
    const password = document.getElementById("inp-pass").value;
    const fullName = document.getElementById("reg-name").value.trim();

    if (!username || !password) {
        showError("Username and password credentials are required.");
        return;
    }

    // Convert username to a valid standard format string for Supabase auth engine
    const pseudoEmail = `${username}@heistsolver.com`;
    const btn = document.getElementById("login-btn");
    
    btn.disabled = true;
    btn.textContent = loginMode === "in" ? "Verifying Credentials..." : "Creating Dossier...";

    try {
        if (loginMode === "in") {
            // login
            const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                email: pseudoEmail,
                password: password,
            });

            if (error) throw error;

            localStorage.setItem("loggedInUser", username);
            window.location.href = "{% url 'dashboard' %}";

        } else {
            // register
            if (!fullName) {
                showError("Please enter your full name to generate a target profile.");
                btn.disabled = false;
                btn.textContent = "Create Account";
                return;
            }

            // Sign up user inside Supabase core identities
            const { data, error: signUpError } = await window.supabaseClient.auth.signUp({
                email: pseudoEmail,
                password: password,
            });

            if (signUpError) throw signUpError;
            if (!data.user) throw new Error("Authentication interface failed to provision identity.");

            // Insert new stats entry row inside public.users table
            const { error: profileError } = await window.supabaseClient
                .from('users')
                .insert([
                    {
                        user_id: data.user.id,
                        username: username,
                        full_name: fullName,
                        rank: 'Rookie',
                        cases_solved: 0,
                        score: 0
                    }
                ]);

            if (profileError) {
                console.error("Profile binding tracking failed:", profileError);
                // If profile table sync failed but auth succeeded, proceed to loop manually
            }

            localStorage.setItem("loggedInUser", username);
            alert("Account created successfully! Welcome to the agency.");
            window.location.href = "{% url 'dashboard' %}";
        }
    } catch (err) {
        showError(err.message || "An unexpected system anomaly has occurred.");
        btn.disabled = false;
        btn.textContent = loginMode === "in" ? "Access Intelligence System" : "Create Account";
    }
}

document.addEventListener("DOMContentLoaded", () => {
    const pass = document.getElementById("inp-pass");
    const user = document.getElementById("inp-user");

    if (pass) {
        pass.addEventListener("keydown", e => {
            if (e.key === "Enter") handleSubmit(e);
        });
    }

    if (user) {
        user.addEventListener("keydown", e => {
            if (e.key === "Enter") pass.focus();
        });
    }
});

</script>

</body>
</html>
