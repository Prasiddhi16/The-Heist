<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heist Solver — Detective Intelligence System</title>
<link rel="stylesheet" href="../styles/root.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>



<body>
    
    <div id="screen-login">
  <div class="login-art">
    <div class="login-art-svg">
      <svg viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bg1" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#1E293B"/>
            <stop offset="100%" stop-color="#0C1628"/>
          </radialGradient>
        </defs>
        <!-- Main circle -->
        <circle cx="110" cy="100" r="75" fill="url(#bg1)" stroke="rgba(59,130,246,.45)" stroke-width="4"/>
        <circle cx="110" cy="100" r="60" fill="none" stroke="rgba(59,130,246,.18)" stroke-width="1.5"/>
        <circle cx="110" cy="100" r="45" fill="none" stroke="rgba(245,158,11,.15)" stroke-width="1" stroke-dasharray="4 4"/>
        <!-- Crosshair -->
        <line x1="110" y1="40" x2="110" y2="160" stroke="rgba(59,130,246,.3)" stroke-width="1.5" stroke-dasharray="4 4"/>
        <line x1="50" y1="100" x2="170" y2="100" stroke="rgba(59,130,246,.3)" stroke-width="1.5" stroke-dasharray="4 4"/>
        <!-- Fingerprint arcs -->
        <path d="M 95 80 Q 110 65 125 80" stroke="rgba(245,158,11,.6)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 90 92 Q 110 72 130 92" stroke="rgba(245,158,11,.5)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M 88 105 Q 110 80 132 105" stroke="rgba(245,158,11,.4)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M 90 118 Q 110 90 130 118" stroke="rgba(245,158,11,.3)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Handle -->
        <rect x="161" y="155" width="55" height="13" rx="6.5" fill="rgba(59,130,246,.45)" stroke="rgba(59,130,246,.7)" stroke-width="2" transform="rotate(45 161 155)"/>
        <!-- Glint -->
        <circle cx="86" cy="78" r="5" fill="rgba(255,255,255,.07)"/>
        <!-- Orbit nodes -->
        <circle cx="110" cy="16" r="4" fill="rgba(59,130,246,.6)"/>
        <circle cx="190" cy="58" r="3" fill="rgba(245,158,11,.5)"/>
        <circle cx="190" cy="148" r="3" fill="rgba(16,185,129,.5)"/>
        <circle cx="22" cy="140" r="3" fill="rgba(139,92,246,.5)"/>
        <circle cx="30" cy="55" r="3" fill="rgba(239,68,68,.4)"/>
        <!-- Connection lines -->
        <line x1="110" y1="20" x2="110" y2="35" stroke="rgba(59,130,246,.3)" stroke-width="1"/>
        <line x1="187" y1="60" x2="175" y2="72" stroke="rgba(245,158,11,.3)" stroke-width="1"/>
      </svg>
    </div>
    <div class="login-art-text">
      <h2>Heist Solver</h2>
      <p>Detective Intelligence System · DBMS Project</p>
    </div>
  </div>

  <div class="login-form-panel">
    <div class="lf-logo">
      <div class="lf-logo-icon">H</div>
      <div>
        <div class="lf-logo-text">Heist Solver</div>
        <div class="lf-logo-sub">Detective Intelligence System</div>
      </div>
    </div>

    <div class="tab-switch">
      <button class="tab-btn active" id="ltab-in" onclick="switchLoginTab('in')">Sign In</button>
      <button class="tab-btn" id="ltab-up" onclick="switchLoginTab('up')">Register</button>
    </div>

    <div id="reg-fields" class="hidden">
      <div class="fg"><label class="flabel">Full Name</label><input class="finput" placeholder="e.g. Inspector Kane" id="reg-name"></div>
    </div>
    <div class="fg"><label class="flabel">Badge ID / Username</label><input class="finput" placeholder="inspector_kane" id="inp-user" value="inspector_kane"></div>
    <div class="fg"><label class="flabel">Password</label><input class="finput" type="password" placeholder="••••••••" id="inp-pass" value="password"></div>
    <button class="submit-btn" onclick="doLogin()">Access Intelligence System </button>
    <p style="text-align:center;color:var(--muted);font-size:.72rem;margin-top:1.25rem">PostgreSQL · University DBMS Project · 2026</p>
  </div>
</div>

</body>
</html>

<script>
function switchLoginTab(m){
  loginMode=m;
  document.getElementById("ltab-in").classList.toggle("active",m==="in");
  document.getElementById("ltab-up").classList.toggle("active",m==="up");
  document.getElementById("reg-fields").classList.toggle("hidden",m==="in");
}
function doLogin(){
  var u=document.getElementById("inp-user").value.trim()||"Inspector";
  S.username=u;
  document.getElementById("nav-uname").textContent=u;
  document.getElementById("nav-av").textContent=u.charAt(0).toUpperCase();
  document.getElementById("sb-av").textContent=u.charAt(0).toUpperCase();
  document.getElementById("sb-name").textContent=u;
  document.getElementById("dash-name").textContent=u;
  var lb=LEADERBOARD.find(function(l){return l.isPlayer;});
  if(lb)lb.name=u;
  document.getElementById("screen-login").style.display="none";
  renderAll();
  nav("dashboard");
  toast("Welcome, "+u+"! Intelligence system access granted.","ok");
}
function doLogout(){
  document.getElementById("screen-login").style.display="flex";
  S.activeCase=null;S.collectedEv=new Set();S.selectedSuspect=null;S.selectedMethod=null;
  toast("Session terminated. Stay safe, Detective.","info");
}
</script>
